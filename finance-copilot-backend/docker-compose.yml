version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finance-copilot-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finance-copilot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: .
    container_name: finance-copilot-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/finance_copilot?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=finance_copilot_jwt_access_secret_key_2026_xyz
      - JWT_REFRESH_SECRET=finance_copilot_jwt_refresh_secret_key_2026_xyz
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
